name: vstream
description: A minimal but scalable video streaming app built with Flutter and Supabase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Backend (Supabase)
  supabase_flutter: ^2.5.0

  # Video Playback
  video_player: ^2.8.2
  chewie: 1.8.1

  # Caching & Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1

  # UI & Utils
  flutter_hooks: ^0.21.0
  hooks_riverpod: ^2.5.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
